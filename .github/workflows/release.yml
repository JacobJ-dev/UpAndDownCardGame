name: CI / Release

on:
  push:
    branches: [ main ] #triggers build and test on every push to main
    tags:
      - 'v*'

jobs:

  # JOB 1: BUILD AND TEST
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --no-build --configuration Release

  #JOB 2: PUBLISH RELEASE ONLY ON v* TAGS
  release:
    runs-on: windows-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish
        run: >
          dotnet publish UpAndDownCardGame/UpAndDownCardGame.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish


      - name: Zip the build
        run: Compress-Archive -Path ./publish/* -DestinationPath ./UpAndDownCardGame-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./UpAndDownCardGame-${{ github.ref_name }}.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: true    # marks it as beta/pre-release automatically

    

      
    