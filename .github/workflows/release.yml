name: Build and Release

on:
  push:
    tags:
      - 'v*'  # triggers when you push a tag like v1.0, v1.1 etc

jobs:
  build:
    runs-on: windows-latest  # uses a Windows machine since its WinForms

    steps:
      # Step 1 - check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 - install .NET 8
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Step 3 - build and publish
      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      # Step 4 - zip the output
      - name: Zip publish folder
        run: Compress-Archive -Path ./publish/* -DestinationPath ./UpAndDownCard.zip

      # Step 5 - create the GitHub release and attach the zip
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./UpAndDownCard.zip
          body: ${{ github.event.release.body }}  # uses your release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
